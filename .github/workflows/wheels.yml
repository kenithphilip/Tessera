name: wheels

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    paths:
      - "rust/crates/tessera-py/**"
      - ".github/workflows/wheels.yml"
  workflow_dispatch:

permissions:
  contents: read

env:
  WHEEL_DIR: rust/crates/tessera-py

jobs:
  linux:
    name: linux-${{ matrix.target }}-py${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
        target: [x86_64, aarch64]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Build manylinux wheel
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          args: --release --out dist --interpreter ${{ matrix.python-version }} --manifest-path ${{ env.WHEEL_DIR }}/Cargo.toml
          manylinux: "2014"
      - name: Upload wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: wheel-linux-${{ matrix.target }}-py${{ matrix.python-version }}
          path: dist/*.whl

  macos:
    name: macos-${{ matrix.target }}-py${{ matrix.python-version }}
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
        target: [x86_64-apple-darwin, aarch64-apple-darwin]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Build macOS wheel
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          args: --release --out dist --interpreter ${{ matrix.python-version }} --manifest-path ${{ env.WHEEL_DIR }}/Cargo.toml
      - name: Upload wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: wheel-macos-${{ matrix.target }}-py${{ matrix.python-version }}
          path: dist/*.whl

  windows:
    name: windows-${{ matrix.target }}-py${{ matrix.python-version }}
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
        target: [x64]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Build windows wheel
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          args: --release --out dist --interpreter ${{ matrix.python-version }} --manifest-path ${{ env.WHEEL_DIR }}/Cargo.toml
      - name: Upload wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: wheel-windows-${{ matrix.target }}-py${{ matrix.python-version }}
          path: dist/*.whl

  sdist:
    name: sdist
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build sdist
        uses: PyO3/maturin-action@v1
        with:
          command: sdist
          args: --out dist --manifest-path ${{ env.WHEEL_DIR }}/Cargo.toml
      - name: Upload sdist artifact
        uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: dist/*.tar.gz

  # TestPyPI publish is opt-in via workflow_dispatch only.
  # Auto-publishing on every push to main has two problems:
  #   1. PyO3/maturin-action's wrapping of `maturin upload --repository testpypi`
  #      strips the --repository flag value, so the job always failed with
  #      "a value is required for '--repository <REPOSITORY>' but none was supplied".
  #   2. Even when fixed, the right gating signal is "we want this build on
  #      TestPyPI", not "every commit to main lands a wheel on TestPyPI".
  # Production releases land on PyPI via the tag-triggered publish-pypi job
  # below (Trusted Publishing).
  publish-testpypi:
    name: Publish to TestPyPI
    needs: [linux, macos, windows, sdist]
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    environment: testpypi
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          skip-existing: true

  publish-pypi:
    name: Publish to PyPI
    needs: [linux, macos, windows, sdist]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          skip-existing: true
