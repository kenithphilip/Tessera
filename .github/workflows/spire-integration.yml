name: SPIRE Integration
# Re-enabled on push after the unix workload attestor uid mismatch
# was resolved by registering BOTH host UID and uid:0 entries
# (deployment/spire/ci-setup.sh) plus a JWT bundle walker fix in
# tessera.spire (commit 3dccb97). 3 consecutive green dispatches
# (24968698602 + 24968817449 + 24968840908) confirmed end-to-end
# bring-up before the push trigger was added. Earlier history of
# 6 layered fixes (trust-bundle extract, correct -joinToken
# propagation, healthcheck socket path, spiffe_id signature
# inspection, parent-ID matching the agent's real SPIFFE ID,
# entry-propagation polling) all still apply and live in this
# file's existing steps.
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  spire-e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e '.[dev,spiffe]'

      - name: Start SPIRE server
        working-directory: deployment/spire
        run: docker compose up -d spire-server

      - name: Wait for SPIRE server
        working-directory: deployment/spire
        run: |
          for i in $(seq 1 30); do
            if docker compose exec -T spire-server \
              /opt/spire/bin/spire-server healthcheck 2>/dev/null; then
              echo "SPIRE server ready"
              break
            fi
            if [ "$i" -eq 30 ]; then
              echo "SPIRE server failed to start"
              docker compose logs spire-server
              exit 1
            fi
            sleep 1
          done

      - name: Start SPIRE agent with join token
        working-directory: deployment/spire
        run: |
          JOIN_TOKEN=$(docker compose exec -T spire-server \
            /opt/spire/bin/spire-server token generate \
            -spiffeID spiffe://example.org/agent \
            -output json | python3 -c "import sys,json; print(json.load(sys.stdin)['value'])")
          if [ -z "${JOIN_TOKEN}" ]; then
            echo "Failed to generate join token"
            docker compose logs spire-server
            exit 1
          fi
          echo "Generated join token (length=${#JOIN_TOKEN})"
          # Export for the workload-registration step: SPIRE's
          # join_token attestor assigns the agent the SPIFFE ID
          # spiffe://<trust-domain>/spire/agent/join_token/<TOKEN>,
          # which must be the parentID on registration entries.
          echo "SPIRE_JOIN_TOKEN=${JOIN_TOKEN}" >> "${GITHUB_ENV}"

          # The agent needs the server's trust bundle to bootstrap,
          # but our published docker-compose.yml does not share a
          # volume between server and agent (so the example stays
          # self-contained for users who run them on separate
          # nodes). Extract the bundle and mount it for CI.
          mkdir -p /tmp/spire-bundle
          docker compose exec -T spire-server \
            /opt/spire/bin/spire-server bundle show -format pem \
            > /tmp/spire-bundle/bundle.crt
          if [ ! -s /tmp/spire-bundle/bundle.crt ]; then
            echo "Failed to extract trust bundle from spire-server"
            docker compose logs spire-server
            exit 1
          fi

          # The spire-agent image ENTRYPOINT is ["spire-agent", "run"].
          # If we override the command with "/opt/spire/bin/spire-agent
          # run -config ... -joinToken ...", the entrypoint prepends a
          # second "spire-agent run", scrambling argv and silently
          # discarding -joinToken. Pass only the flags here; the
          # entrypoint provides the binary + subcommand.
          docker compose run -d --name spire-agent-ci \
            -v /tmp/spire-bundle/bundle.crt:/run/spire/bundle.crt:ro \
            spire-agent \
            -config /opt/spire/conf/agent/agent.conf \
            -joinToken "${JOIN_TOKEN}"

          # The healthcheck command defaults to
          # /tmp/spire-agent/public/api.sock; our agent.conf binds the
          # Workload API to /tmp/spire-agent-api/api.sock so we need to
          # pass --socketPath explicitly.
          for i in $(seq 1 30); do
            if docker exec spire-agent-ci \
              /opt/spire/bin/spire-agent healthcheck \
              --socketPath /tmp/spire-agent-api/api.sock 2>/dev/null; then
              echo "SPIRE agent ready"
              break
            fi
            if [ "$i" -eq 30 ]; then
              echo "SPIRE agent failed to start"
              docker logs spire-agent-ci
              exit 1
            fi
            sleep 1
          done

      - name: Register workload entries
        working-directory: deployment/spire
        run: bash ci-setup.sh

      - name: Wait for agent to receive workload entry
        run: |
          # SPIRE agent polls the server for entries every 5s by
          # default. Without this wait, tests run before the
          # newly-created test-runner entry has been pushed to the
          # agent and fail with "no identity issued"
          # (PERMISSION_DENIED). Poll the local Workload API until
          # an x509-SVID is issuable for our UID.
          for i in $(seq 1 20); do
            if docker exec spire-agent-ci \
              /opt/spire/bin/spire-agent api fetch x509 \
              -socketPath /tmp/spire-agent-api/api.sock 2>/dev/null \
              | grep -q "SPIFFE ID:"; then
              echo "Agent has workload entry (iteration $i)"
              break
            fi
            if [ "$i" -eq 20 ]; then
              echo "Agent never received the workload entry"
              docker logs spire-agent-ci | tail -50
              exit 1
            fi
            sleep 1
          done

      - name: PEERCRED diagnostic (uid 0 vs host uid)
        # The Workload API socket is bind-mounted between host and the
        # spire-agent container. Tests run as the host runner UID
        # (typically 1001 on ubuntu-latest), but `docker exec` calls
        # connect as the container's default user (uid 0). The agent
        # only issues an identity for selectors registered on the
        # observed PEERCRED uid, so both must succeed for the workflow
        # to be trustworthy. This step exercises both paths and captures
        # the agent's logged PEERCRED reading for any future regression.
        run: |
          set +e
          echo "=== uid 0 path: docker exec -> spire-agent api fetch x509 ==="
          docker exec spire-agent-ci \
            /opt/spire/bin/spire-agent api fetch x509 \
            -socketPath /tmp/spire-agent-api/api.sock 2>&1 \
            | grep -E "SPIFFE ID:|received .* svid|no identity" \
            | head -5
          echo ""
          echo "=== host uid $(id -u) path: spire-agent CLI from host (best-effort) ==="
          # The spire-agent CLI is shipped in the agent image, not on
          # the host runner. Use `python` + the spiffe SDK as a stand-in
          # so this step works without installing the SPIRE binaries on
          # the runner. The actual integration tests use the same socket
          # via the spiffe SDK, so this proves the host-uid path before
          # pytest runs.
          python3 - <<'PY'
          import os, sys
          try:
              from spiffe.workloadapi.default_x509_source import DefaultX509Source
              src = DefaultX509Source(socket_path="unix:///tmp/spire-agent-api/api.sock")
              svid = src.svid
              print(f"  host SVID: {svid.spiffe_id}")
              src.close()
          except Exception as exc:
              print(f"  host SVID fetch failed: {type(exc).__name__}: {exc}")
              sys.exit(0)  # diagnostic only; do not fail the job here
          PY
          echo ""
          echo "=== agent log (peer/workload/attest lines, last 30) ==="
          docker logs spire-agent-ci 2>&1 \
            | grep -iE "peer|workload|attest" \
            | tail -30 || true
          set -e

      - name: Run SPIRE integration tests
        env:
          SPIFFE_ENDPOINT_SOCKET: unix:///tmp/spire-agent-api/api.sock
          TESSERA_SPIRE_TRUST_DOMAIN: example.org
        run: pytest tests/integration/ -v --tb=long

      - name: Tear down
        if: always()
        working-directory: deployment/spire
        run: |
          docker rm -f spire-agent-ci 2>/dev/null || true
          docker compose down -v
