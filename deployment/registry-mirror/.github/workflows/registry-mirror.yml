name: MCP Registry Mirror Sync

on:
  schedule:
    # Nightly at 02:00 UTC, avoiding the top of the hour to reduce congestion.
    - cron: "0 2 * * *"
  workflow_dispatch:
    inputs:
      upstream_url:
        description: "Upstream MCP registry URL (override)"
        required: false
        default: "https://registry.modelcontextprotocol.io"

concurrency:
  group: registry-mirror
  cancel-in-progress: false

permissions:
  contents: read
  packages: write
  id-token: write  # required for Sigstore OIDC

jobs:
  sync:
    name: Sync and push mirror
    runs-on: ubuntu-latest

    env:
      # Move the dispatch input into an env var before use in run steps.
      UPSTREAM_URL: ${{ inputs.upstream_url || 'https://registry.modelcontextprotocol.io' }}
      MIRROR_IMAGE: ghcr.io/kenithphilip/mcp-registry-mirror
      OUTPUT_DIR: mirror-output

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Tessera
        run: pip install -e '.[dev]'

      - name: Install oras CLI
        run: |
          ORAS_VERSION=1.2.0
          curl -sSL \
            "https://github.com/oras-project/oras/releases/download/v${ORAS_VERSION}/oras_${ORAS_VERSION}_linux_amd64.tar.gz" \
            | tar -xz -C /usr/local/bin oras
          oras version

      - name: Resolve HMAC key
        # Use the stored secret when available; fall back to an ephemeral key.
        # Note: ephemeral keys produce different signatures on each run, which
        # prevents incremental consumers from verifying signatures across runs.
        # Set TESSERA_MIRROR_HMAC_KEY as a repository secret for stable sigs.
        run: |
          if [ -n "${{ secrets.TESSERA_MIRROR_HMAC_KEY }}" ]; then
            echo "TESSERA_MIRROR_HMAC_KEY=${{ secrets.TESSERA_MIRROR_HMAC_KEY }}" >> "$GITHUB_ENV"
          else
            echo "warn: TESSERA_MIRROR_HMAC_KEY not set; using ephemeral key" >&2
            echo "TESSERA_MIRROR_HMAC_KEY=$(openssl rand -hex 32)" >> "$GITHUB_ENV"
          fi

      - name: Run mirror sync
        run: |
          tessera mcp mirror sync \
            --upstream "$UPSTREAM_URL" \
            --out "$OUTPUT_DIR" \
            --sign hmac

      - name: Print mirror status
        run: tessera mcp mirror status --out "$OUTPUT_DIR"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push OCI artifacts
        run: |
          bash deployment/registry-mirror/oras-push.sh \
            "$OUTPUT_DIR" \
            "$MIRROR_IMAGE"

      - name: Upload mirror manifest as artifact
        uses: actions/upload-artifact@v4
        with:
          name: mirror-manifest-${{ github.run_id }}
          path: ${{ env.OUTPUT_DIR }}/mirror-manifest.json
          retention-days: 90
