apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "tessera-mesh.fullname" . }}-config
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "tessera-mesh.labels" . | nindent 4 }}
  annotations:
    tessera.dev/version: {{ .Chart.AppVersion | quote }}
data:
  config.yaml: |
    policy:
      enforcement_mode: {{ .Values.policy.enforcementMode | quote }}
    critic:
      mode: {{ .Values.policy.critic.mode | quote }}
    mcp:
      tier_min: {{ .Values.policy.mcp.tierMin | quote }}
    otel:
      endpoint: {{ .Values.otel.endpoint | quote }}
      insecure: {{ .Values.otel.insecure }}
    audit_log:
      path: {{ .Values.auditLog.mountPath | quote }}
