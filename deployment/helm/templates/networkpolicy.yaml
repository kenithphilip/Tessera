{{- if .Values.networkPolicy.enabled -}}
# Default-deny ingress + egress with explicit allowlists.
# Ingress: only the agent-app container on the same pod (localhost) may reach
# the proxy port. No external ingress is permitted by default.
# Egress: Kubernetes DNS (port 53), the OTel collector, and the SPIRE socket
# (host-level, not network) are permitted. Add entries via additionalEgress.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "tessera-mesh.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "tessera-mesh.labels" . | nindent 4 }}
  annotations:
    tessera.dev/version: {{ .Chart.AppVersion | quote }}
spec:
  podSelector:
    matchLabels:
      {{- include "tessera-mesh.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Allow intra-pod traffic from the agent-app container (same pod).
    # NetworkPolicy cannot restrict intra-pod localhost traffic; this rule is
    # a forward-compatible placeholder for when Kubernetes adds ambient-mesh
    # or policy enforcement at the container level.
    - from:
        - podSelector:
            matchLabels:
              {{- include "tessera-mesh.selectorLabels" . | nindent 14 }}
      ports:
        - protocol: TCP
          port: {{ .Values.service.port }}
    {{- with .Values.networkPolicy.additionalIngress }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
  egress:
    # Kubernetes DNS
    - to:
        - namespaceSelector: {}
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    # OTel collector
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: observability
      ports:
        - protocol: TCP
          port: 4317
    {{- with .Values.networkPolicy.additionalEgress }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
{{- end }}
