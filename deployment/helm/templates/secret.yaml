{{- if not .Values.signing.existingSecret -}}
# Chart-managed Secret stub. This is provided for local development and
# quick-start purposes only. For production deployments, create the Secret
# out-of-band (e.g. via Vault, AWS Secrets Manager, or the secrets-store CSI
# driver) and set signing.existingSecret to its name. The keys hmacKey and
# oauthClientSecret must be base64-encoded values.
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "tessera-mesh.fullname" . }}-signing
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "tessera-mesh.labels" . | nindent 4 }}
  annotations:
    tessera.dev/version: {{ .Chart.AppVersion | quote }}
    helm.sh/resource-policy: keep
type: Opaque
data:
  hmac-key: {{ .Values.signing.hmacKey | b64enc | quote }}
  oauth-client-secret: {{ .Values.signing.oauthClientSecret | b64enc | quote }}
{{- end }}
