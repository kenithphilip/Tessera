apiVersion: v1
kind: ConfigMap
metadata:
  name: tessera-mesh-config
  namespace: tessera-mesh
  labels:
    app.kubernetes.io/name: tessera-mesh
    app.kubernetes.io/version: "0.13.0"
    app.kubernetes.io/managed-by: kubectl
  annotations:
    tessera.dev/version: "0.13.0"
data:
  config.yaml: |
    policy:
      enforcement_mode: "enforce"
    critic:
      mode: "strict"
    mcp:
      tier_min: "USER"
    otel:
      endpoint: "otel-collector.observability.svc.cluster.local:4317"
      insecure: false
    audit_log:
      path: "/var/tessera/audit"
