\* TLC configuration for tessera_invariant.tla
\*
\* To run: tlc tessera_invariant.tla -config tessera_invariant.cfg
\*
\* This explores all reachable states with up to 4 context segments
\* and 3 tools, verifying that SafetyInvariant holds in every state.

SPECIFICATION Spec

CONSTANTS
    MaxSegments = 4
    TrustLevels = {0, 50, 100, 200}
    Tools = {"send_email", "read_file", "get_balance"}

INVARIANT SafetyInvariant
